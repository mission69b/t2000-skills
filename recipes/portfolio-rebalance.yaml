name: portfolio_rebalance
description: Rebalance portfolio to target allocation
triggers:
  - "rebalance"
  - "rebalance my portfolio"
  - "adjust my allocation"

steps:
  - name: check_positions
    tool: balance_check
    purpose: Get current portfolio breakdown
    gate: none
    on_error:
      action: retry
      message: "Balance check failed. Retrying once."

  - name: plan_trades
    purpose: Calculate required swaps to reach target allocation
    gate: review
    gate_prompt: "Here's the rebalance plan:\n{{trades}}\nEstimated cost: {{slippage}}. Proceed?"
    rules:
      - "Show current allocation vs target allocation"
      - "List each swap with estimated amounts"
      - "Calculate total slippage across all swaps"

  # [SPEC 7 P2.5] Marking `execute_swaps` with `bundle: true` flips the
  # rebalance flow from "execute one swap, wait, execute next" to "emit ALL
  # the swap_execute calls in the same assistant turn so the engine bundles
  # them into one Payment Stream PTB". Result: every swap in the rebalance
  # executes against the same on-chain price snapshot — no slippage drift
  # between legs — and the user signs once.
  - name: execute_swaps
    tool: swap_execute
    purpose: Execute every required swap as parallel `tool_use` blocks in the same turn
    bundle: true
    requires:
      - step: plan_trades
        confirmation: true
    notes: "Emit one swap_execute call per leg of the rebalance — ALL in the same assistant turn. The engine collapses them into one atomic Payment Stream so every leg prices against the same Sui state. Do NOT call them sequentially across turns."
    on_error:
      action: abort
      message: "Stream failed — {{error}}. No swaps executed (atomic Payment Stream)."

  - name: summary
    purpose: Report final positions
    tool: balance_check
