name: swap_and_save
description: Swap a token to USDC and deposit into savings
triggers:
  - "swap and save"
  - "convert and deposit"
  - "swap to USDC then save"
  - "move everything to savings"

steps:
  - name: check_balance
    tool: balance_check
    purpose: Get current token balances
    gate: none
    on_error:
      action: retry
      message: "Balance check failed. Retrying once."

  # [SPEC 7 P2.5] Both writes carry `bundle: true` so the LLM emits the two
  # `tool_use` blocks in the same assistant turn. The engine's permission gate
  # collapses them into ONE bundled `pending_action` (one PermissionCard, one
  # signature, atomic). No more sequential "swap → wait → deposit" — the
  # `received` coin-ref is handed off in-PTB at compose time (Layer 1).
  - name: swap_to_usdc
    tool: swap_execute
    purpose: Swap source token to USDC
    bundle: true
    requires:
      - step: check_balance
        field: available_amount
    gate: estimate
    gate_prompt: "At ${{price}}/{{token}}, you'll receive ~${{estimate}} USDC."
    on_error:
      action: abort
      message: "Stream failed — {{error}}. No funds moved (atomic Payment Stream)."

  - name: deposit
    tool: save_deposit
    purpose: Deposit received USDC into savings
    bundle: true
    requires:
      - step: swap_to_usdc
        field: received
    gate: none
    notes: "Inside the same Payment Stream — the swap's received coin is handed off as the deposit input via PTB coin-ref, not as a separate confirm."
    on_error:
      action: abort
      message: "Stream failed — {{error}}. Both legs reverted (atomic Payment Stream)."
